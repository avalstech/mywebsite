version: 1
frontend:
  phases:
    preBuild:
      commands:
        - rm -rf node_modules/.vite dist
        - npm ci
    build:
      commands:
        - npm run lint
        - npm run test
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
