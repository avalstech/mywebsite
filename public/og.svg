<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="60" />
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="260" cy="170" r="190" fill="#38bdf8" opacity="0.35" filter="url(#blur)"/>
  <circle cx="980" cy="520" r="230" fill="#0ea5e9" opacity="0.28" filter="url(#blur)"/>

  <g font-family="Arial, Helvetica, sans-serif" fill="#ffffff">
    <text x="600" y="290" text-anchor="middle" font-size="78" font-weight="800">Victor Anene</text>
    <text x="600" y="360" text-anchor="middle" font-size="34" opacity="0.92">Senior Product Manager • Venture Builder</text>
    <text x="600" y="430" text-anchor="middle" font-size="28" opacity="0.9">Clarity • Speed • Trust</text>
  </g>
</svg>
